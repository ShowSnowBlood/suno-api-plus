version: '3'

services:
  suno-api:
    build:
      context: .
      args:
        SUNO_COOKIE: ${SUNO_COOKIE}
    volumes:
      - ./public:/app/public
      - ./data:/app/data
    ports:
      # Keep the app behind the HTTPS reverse proxy in production.
      - "127.0.0.1:3000:3000"
    env_file: ".env"
